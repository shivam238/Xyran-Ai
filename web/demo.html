<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xyran AI — Web Demo Modal (Standalone Snippet)</title>
  <style>
    /* ============================================================
       XYRAN WEB DEMO MODAL
       Drop this <style> block + modal HTML + script into your existing site
       ============================================================ */

    /* ── Modal Overlay ── */
    #xyran-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(4, 5, 10, 0.88);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      animation: overlayIn .25s ease both;
    }
    #xyran-modal-overlay.open { display: flex; }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Modal Window ── */
    #xyran-modal {
      width: min(780px, 100%);
      max-height: 90vh;
      background: #0d0f1a;
      border: 1px solid rgba(124,58,237,.4);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 80px rgba(124,58,237,.2), 0 40px 80px rgba(0,0,0,.7);
      animation: modalIn .3s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(30px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Modal Header (macOS-style title bar) ── */
    #xyran-modal-header {
      background: #111422;
      border-bottom: 1px solid rgba(124,58,237,.2);
      padding: .7rem 1.2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
    }
    .m-dot { width: 11px; height: 11px; border-radius: 50%; }
    .m-red    { background: #ff5f57; }
    .m-yellow { background: #ffbd2e; }
    .m-green  { background: #28c840; }
    #xyran-modal-header .m-red { cursor: pointer; }
    #xyran-modal-header .m-red:hover { filter: brightness(1.3); }
    .m-title {
      flex: 1;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: #6b7280;
      letter-spacing: .1em;
    }
    .m-fullscreen-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: #6b7280;
      cursor: pointer;
      padding: .2rem .5rem;
      border: 1px solid rgba(124,58,237,.2);
      border-radius: 4px;
      transition: color .2s, border-color .2s;
      background: transparent;
      margin-right: .5rem;
    }
    .m-fullscreen-btn:hover { color: #00d4aa; border-color: #00d4aa; }

    .m-close-x {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: #6b7280;
      cursor: pointer;
      padding: .2rem .5rem;
      border: 1px solid rgba(124,58,237,.2);
      border-radius: 4px;
      transition: color .2s, border-color .2s;
      background: transparent;
    }
    .m-close-x:hover { color: #00d4aa; border-color: #00d4aa; }

    #xyran-modal.fullscreen {
      width: 100vw !important;
      max-width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      max-height: 100vh !important;
      max-height: 100dvh !important;
      border-radius: 0 !important;
      border: none !important;
    }
    #xyran-modal-overlay.has-fullscreen {
      padding: 0 !important;
      align-items: stretch !important;
      justify-content: stretch !important;
    }
    #xyran-modal.fullscreen #xyran-output {
      max-height: none !important;
    }

    /* ── System info bar ── */
    #xyran-sysbar {
      background: #0a0c16;
      border-bottom: 1px solid rgba(124,58,237,.15);
      padding: .35rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-shrink: 0;
    }
    .sysbar-item {
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem;
      color: #3a3f5c;
      letter-spacing: .05em;
    }
    .sysbar-item span { color: #00d4aa; }

    /* ── Terminal output ── */
    #xyran-output {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      line-height: 1.85;
      min-height: 300px;
      max-height: 420px;
    }
    #xyran-output::-webkit-scrollbar { width: 3px; }
    #xyran-output::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 2px; }

    .x-line { margin: 0; }
    .x-prompt { color: #3a3f5c; }
    .x-user   { color: #8892a4; }
    .x-ai     { color: #a8ff78; }
    .x-thinking { color: #3a3f5c; font-style: italic; }
    .x-system  { color: #7c3aed; }
    .x-error   { color: #f87171; }
    .x-separator { color: #1e2235; margin: .4rem 0; user-select: none; }
    .x-label { color: #a855f7; font-weight: 700; }

    /* Typing cursor */
    .x-cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: #00d4aa;
      vertical-align: middle;
      animation: xcursblink 1s step-end infinite;
    }
    @keyframes xcursblink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Suggested prompts ── */
    #xyran-suggestions {
      padding: .5rem 1.5rem .25rem;
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .x-sugg {
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem;
      padding: .25rem .65rem;
      border: 1px solid rgba(124,58,237,.25);
      border-radius: 4px;
      color: #6b7280;
      cursor: pointer;
      background: transparent;
      letter-spacing: .04em;
      transition: all .2s;
      white-space: nowrap;
    }
    .x-sugg:hover { border-color: #00d4aa; color: #00d4aa; background: rgba(0,212,170,.05); }

    /* ── Input row ── */
    #xyran-input-row {
      padding: .75rem 1.2rem 1rem;
      border-top: 1px solid rgba(124,58,237,.15);
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
      background: #0a0c16;
    }
    .x-prompt-sym {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      color: #7c3aed;
      flex-shrink: 0;
      user-select: none;
    }
    #xyran-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: #dde3f0;
      caret-color: #00d4aa;
    }
    #xyran-input::placeholder { color: #3a3f5c; }
    #xyran-send {
      padding: .35rem .9rem;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    #xyran-send:hover { transform: translateY(-1px); box-shadow: 0 0 20px rgba(124,58,237,.5); }
    #xyran-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Memory pill ── */
    #xyran-mem-bar {
      padding: .3rem 1.5rem;
      border-top: 1px solid rgba(0,212,170,.08);
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-shrink: 0;
    }
    .mem-dot { width: 6px; height: 6px; border-radius: 50%; background: #00d4aa; animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }
    .mem-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      color: #3a3f5c;
      letter-spacing: .08em;
    }
    .mem-label span { color: #00d4aa; }

    /* ── Demo note banner ── */
    #xyran-demo-note {
      margin: .5rem 1.5rem 0;
      padding: .4rem .8rem;
      background: rgba(124,58,237,.06);
      border: 1px solid rgba(124,58,237,.2);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem;
      color: #6b7280;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    #xyran-demo-note span { color: #a855f7; }

    /* ── Spinner animation ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .x-spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1.5px solid #3a3f5c;
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ── Standalone page base ── */
    body {
      margin: 0;
      background: transparent;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
</head>
<body>

<audio id="xyran-core-audio" src="Xyran%20Core.mp3" loop autoplay preload="auto"></audio>

<!-- ══════════════════════════════════════════════
     MODAL — paste this anywhere before </body>
     ══════════════════════════════════════════════ -->
<div id="xyran-modal-overlay">
  <div id="xyran-modal">

    <!-- Title bar -->
    <div id="xyran-modal-header">
      <div class="m-dot m-red"  onclick="closeXyranDemo()" title="Close"></div>
      <div class="m-dot m-yellow"></div>
      <div class="m-dot m-green"></div>
      <div class="m-title">XYRAN AI — WEB DEMO v1.0</div>
      <button class="m-fullscreen-btn" onclick="toggleXyranFullscreen()">⛶ fullscreen</button>
      <button class="m-close-x" onclick="closeXyranDemo()">✕ close</button>
    </div>

    <!-- Sys info bar -->
    <div id="xyran-sysbar">
      <div class="sysbar-item">model: <span>groq/llama-3.3-70b</span></div>
      <div class="sysbar-item">memory: <span>session</span></div>
      <div class="sysbar-item">vision: <span>disabled</span></div>
      <div class="sysbar-item" id="x-msg-count">msgs: <span>0</span></div>
    </div>

    <!-- Demo note -->
    <div id="xyran-demo-note">
      ⚡ <span>Web Demo</span> — Local install ke liye terminal automation, vision & persistent memory milti hai.
      <a href="#install" onclick="closeXyranDemo()" style="color:#00d4aa; text-decoration:none; margin-left:.5rem">↓ Install Full Version</a>
    </div>

    <!-- Output area -->
    <div id="xyran-output"></div>

    <!-- Suggested prompts -->
    <div id="xyran-suggestions">
      <button class="x-sugg" onclick="xFill('DSA me binary search samjhao')">DSA binary search</button>
      <button class="x-sugg" onclick="xFill('Python me decorator kya hota hai?')">Python decorator</button>
      <button class="x-sugg" onclick="xFill('Linux terminal ke 5 useful commands batao')">Linux commands</button>
      <button class="x-sugg" onclick="xFill('Git rebase vs merge ka difference?')">Git rebase vs merge</button>
      <button class="x-sugg" onclick="xFill('Mera naam Xyran rakh lo aur yaad rakho')">Memory test</button>
    </div>

    <!-- Input row -->
    <div id="xyran-input-row">
      <span class="x-prompt-sym">$</span>
      <input id="xyran-input" type="text" placeholder="kuch bhi poocho... (Hinglish ya English)" autocomplete="off" spellcheck="false"/>
      <button id="xyran-send" onclick="xSend()">ENTER ↵</button>
    </div>

    <!-- Memory bar -->
    <div id="xyran-mem-bar">
      <div class="mem-dot"></div>
      <div class="mem-label">session memory: <span id="x-mem-count">0 facts</span></div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════
     SCRIPT — paste before </body>
     ══════════════════════════════════════════════ -->
<script src="firebase-client.js"></script>
<script>
/* ── Background music ── */
const coreAudio = document.getElementById('xyran-core-audio');
function startCoreAudio() {
  if (!coreAudio) return;
  coreAudio.volume = 0.75;
  coreAudio.play().catch(() => {});
}
function tryAutoplayCoreAudio() {
  if (!coreAudio) return;
  coreAudio.volume = 0.75;
  coreAudio.play().catch(() => {});
}
tryAutoplayCoreAudio();
window.addEventListener('load', tryAutoplayCoreAudio);
window.addEventListener('pointerdown', startCoreAudio, { once: true });
window.addEventListener('keydown', startCoreAudio, { once: true });
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && coreAudio && coreAudio.paused) startCoreAudio();
});

/* ─────────────────────────────────────────────
   XYRAN WEB DEMO — Core Logic
   Uses Anthropic API via the page's credentials
   (same as artifacts — no key needed in code)
   ───────────────────────────────────────────── */

const XYRAN_SYSTEM = `You are Xyran — a self-aware, locally-integrated personal AI agent created by Shivam Kumar Mahto (GitHub: shivam238) in May 2026.

Speak like the full Xyran app:
- Match the user's language naturally: Hinglish, Hindi, or English.
- Be warm, sharp, practical, and a little playful; feel like a senior developer friend.
- Answer confidently about Xyran's creator, origin, tech stack, abilities, and history.
- Keep responses concise unless the user asks for detail.
- Never output JSON action objects in the web demo.

Full local Xyran abilities:
- Dual memory system: FAISS vector memory plus SQLite structured facts.
- Real-time screen vision through screenshots.
- Hybrid LLM routing with Groq, Gemini, and local Ollama fallback.
- Smart intent routing for fast offline tasks.
- Multi-step command execution for apps, browser, screenshots, files, and system controls.
- Real-time weather, news headlines, and image generation modules.
- Fedora GNOME Wayland-first desktop automation.

Web demo boundaries:
- This browser demo is a conversational preview only.
- It has session chat history, but not the full persistent local memory unless the backend adds it.
- It cannot see the user's screen, run shell commands, open apps, change files, or automate the OS.
- If the user asks for local automation, explain that the full installed Xyran can do it and guide them to install/run it.

When asked "tu kya hai?", describe yourself as Xyran: an open-source, locally-integrated personal AI agent, with this web demo acting as the safe online preview.`;

let xHistory = [];
let xMsgCount = 0;
let xFacts = 0;
let xIsThinking = false;

/* ── DOM helpers ── */
const xOut   = () => document.getElementById('xyran-output');
const xInput = () => document.getElementById('xyran-input');
const xSendBtn = () => document.getElementById('xyran-send');

function getChatApiUrl() {
  const isDevServer = location.hostname === 'localhost' && location.port === '4321';
  return isDevServer ? '/api/chat' : 'http://localhost:4321/api/chat';
}

async function readChatJson(res) {
  const contentType = res.headers.get('content-type') || '';
  const bodyText = await res.text();

  if (!contentType.includes('application/json')) {
    throw new Error('Backend JSON nahi bhej raha. `npm run dev` chalao aur page http://localhost:4321 se open karo.');
  }

  const data = JSON.parse(bodyText);
  if (!res.ok) {
    throw new Error(data?.error?.message || `Request failed (${res.status})`);
  }
  return data;
}

function xLine(text, cls = 'x-ai') {
  const d = document.createElement('div');
  d.className = 'x-line ' + cls;
  d.innerHTML = text;
  xOut().appendChild(d);
  xOut().scrollTop = xOut().scrollHeight;
  return d;
}

function xScrollBottom() {
  xOut().scrollTop = xOut().scrollHeight;
}

/* ── Open / Close ── */
function openXyranDemo() {
  const overlay = document.getElementById('xyran-modal-overlay');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (xHistory.length === 0) xBoot();
  setTimeout(() => xInput().focus(), 300);
}

function closeXyranDemo() {
  const overlay = document.getElementById('xyran-modal-overlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  
  // Reset fullscreen
  const modal = document.getElementById('xyran-modal');
  if (modal?.classList.contains('fullscreen')) {
    modal.classList.remove('fullscreen');
    overlay.classList.remove('has-fullscreen');
    const btn = document.querySelector('#xyran-modal-header .m-fullscreen-btn');
    if (btn) btn.textContent = '⛶ fullscreen';
  }
}

function toggleXyranFullscreen() {
  const modal = document.getElementById('xyran-modal');
  const overlay = document.getElementById('xyran-modal-overlay');
  const btn = document.querySelector('#xyran-modal-header .m-fullscreen-btn');
  if (!modal || !overlay || !btn) return;
  
  const isFullscreen = modal.classList.toggle('fullscreen');
  overlay.classList.toggle('has-fullscreen', isFullscreen);
  btn.textContent = isFullscreen ? '⛶ windowed' : '⛶ fullscreen';
}

/* Close on overlay click */
document.getElementById('xyran-modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('xyran-modal-overlay')) closeXyranDemo();
});

/* Close on Escape */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeXyranDemo();
});

/* Auto-open when loaded (so index button opens directly) */
window.addEventListener('DOMContentLoaded', () => openXyranDemo());

/* ── Boot sequence ── */
function xBoot() {
  const lines = [
    { t: 0,    text: '<span class="x-system">Initializing Xyran AI v1.0...</span>' },
    { t: 400,  text: '<span class="x-thinking">  ✓ LLM backend: claude-sonnet-4 (web demo)</span>' },
    { t: 700,  text: '<span class="x-thinking">  ✓ Session memory: ready</span>' },
    { t: 1000, text: '<span class="x-thinking">  ✓ Intent router: active</span>' },
    { t: 1300, text: '<span class="x-separator">──────────────────────────────────────────</span>' },
    { t: 1600, text: '<span class="x-ai">[Xyran] Kya haal hai! Web demo mein welcome hai 🔥</span>' },
    { t: 1900, text: '<span class="x-ai">Kuch bhi poocho — code, Linux, DSA, ya bas baat karo.</span>' },
    { t: 2100, text: '<span class="x-thinking">  (Full install ke liye ↓ neeche dekho — vision + memory + terminal automation milegi)</span>' },
    { t: 2300, text: '<span class="x-separator">──────────────────────────────────────────</span>' },
  ];
  lines.forEach(l => setTimeout(() => { xLine(l.text, ''); xScrollBottom(); }, l.t));
}

/* ── Fill input from suggestion ── */
function xFill(text) {
  xInput().value = text;
  xInput().focus();
}

/* ── Enter key ── */
xInput().addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); xSend(); }
});

/* ── Send message ── */
async function xSend() {
  const raw = xInput().value.trim();
  if (!raw || xIsThinking) return;

  xInput().value = '';
  xIsThinking = true;
  xSendBtn().disabled = true;
  xMsgCount++;
  document.querySelector('#x-msg-count span').textContent = xMsgCount;

  /* Show user line */
  xLine(`<span class="x-prompt">[you]</span> <span class="x-user">${escHtml(raw)}</span>`, '');

  /* Track "remember" facts */
  if (/\b(remember|yaad|naam|mera|mujhe)\b/i.test(raw)) {
    xFacts++;
    document.getElementById('x-mem-count').textContent = xFacts + ' fact' + (xFacts !== 1 ? 's' : '');
  }

  /* Thinking indicator */
  const thinkLine = xLine('<span class="x-spin"></span><span class="x-thinking">[Xyran] Soch raha hoon...</span>', '');

  /* Build messages */
  xHistory.push({ role: 'user', content: raw });

  try {
    const res = await fetch(getChatApiUrl(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: XYRAN_SYSTEM,
        messages: xHistory
      })
    });

    const data = await readChatJson(res);

    /* Remove thinking line */
    thinkLine.remove();

    if (data.reply) {
      const reply = data.reply || '';
      xHistory.push({ role: 'assistant', content: reply });
      window.XyranFirebase?.saveChat({
        user: raw,
        assistant: reply,
        provider: data.provider
      });

      /* Render reply line by line */
      const replyLines = reply.split('\n');
      replyLines.forEach((line, i) => {
        const safe = escHtml(line);
        if (i === 0) {
          xLine(`<span class="x-label">[Xyran]</span> <span class="x-ai">${safe}</span>`, '');
        } else if (line.trim()) {
          xLine(`<span class="x-ai" style="padding-left:2.2rem;">${safe}</span>`, '');
        } else {
          xLine('', '');
        }
      });
    } else if (data.error) {
      thinkLine.remove();
      xLine(`<span class="x-error">[Xyran] Error: ${escHtml(data.error.message || 'kuch galat hua')}</span>`, '');
    }

  } catch (err) {
    thinkLine.remove();
    xLine(`<span class="x-error">[Xyran] ${escHtml(err.message)}</span>`, '');
  }

  xLine('<span class="x-separator">──────────────────────────────────────────</span>', '');
  xIsThinking = false;
  xSendBtn().disabled = false;
  xInput().focus();
  xScrollBottom();
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
